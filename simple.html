  <body data-page="simple">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="回到首頁">
        <span class="brand-mark">ERP</span>
        <span>介紹</span>

      <nav class="main-nav" aria-label="主要導覽">

    <main id="top">
      <section class="section" id="simple" aria-labelledby="simple-title">
        <div class="section-heading">
          <p class="eyebrow">簡單說明</p>
          <h1 id="simple-title">快速入門圖文</h1>
          <p>這一區直接呈現你已確認過的圖文內容。先選擇模組，再查看該資料夾內的所有圖片，點圖片可以放大。</p>
        </div>

        <div class="module-picker">
          <label for="quickModuleSelect">選擇快速入門模組</label>
          <select id="quickModuleSelect"></select>
        </div>

        <div class="quick-journey" id="simpleImages"></div>

    <div class="lightbox" id="imageLightbox" hidden>
      <button class="lightbox-close" type="button" aria-label="關閉圖片">×</button>
      <figure>
        <img id="lightboxImage" src="" alt="">
        <figcaption id="lightboxCaption"></figcaption>
      </figure>
    </div>

    <footer class="site-footer">
    </footer>
